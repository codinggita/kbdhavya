<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- UrbanMove Logo -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B4B4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008080;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Bus Icon -->
  <g transform="translate(10, 15)">
    <!-- Bus Body -->
    <rect x="0" y="8" width="28" height="16" rx="3" fill="url(#logoGradient)" />
    <!-- Bus Windows -->
    <rect x="3" y="11" width="5" height="4" rx="1" fill="#ffffff" opacity="0.9" />
    <rect x="10" y="11" width="5" height="4" rx="1" fill="#ffffff" opacity="0.9" />
    <rect x="17" y="11" width="5" height="4" rx="1" fill="#ffffff" opacity="0.9" />
    <!-- Bus Wheels -->
    <circle cx="6" cy="26" r="2" fill="#ffffff" />
    <circle cx="22" cy="26" r="2" fill="#ffffff" />
    <!-- Bus Door -->
    <rect x="24" y="13" width="3" height="8" rx="1" fill="#ffffff" opacity="0.8" />
  </g>
  
  <!-- UrbanMove Text -->
  <text x="45" y="25" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="url(#logoGradient)">UrbanMove</text>
  <text x="45" y="42" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8" font-weight="500" fill="#00B4B4" opacity="0.8">Smart Commutes</text>
</svg>