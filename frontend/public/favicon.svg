<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B4B4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008080;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#000000"/>
  
  <!-- UrbanMove Logo - Bus Icon -->
  <g transform="translate(25, 30)">
    <!-- Bus Body -->
    <rect x="0" y="8" width="28" height="16" rx="3" fill="url(#faviconGradient)" />
    <!-- Bus Windows -->
    <rect x="3" y="11" width="5" height="4" rx="1" fill="#ffffff" opacity="0.9" />
    <rect x="10" y="11" width="5" height="4" rx="1" fill="#ffffff" opacity="0.9" />
    <rect x="17" y="11" width="5" height="4" rx="1" fill="#ffffff" opacity="0.9" />
    <!-- Bus Wheels -->
    <circle cx="6" cy="26" r="2" fill="#ffffff" />
    <circle cx="22" cy="26" r="2" fill="#ffffff" />
    <!-- Bus Door -->
    <rect x="24" y="13" width="3" height="8" rx="1" fill="#ffffff" opacity="0.8" />
  </g>
  
  <!-- UrbanMove Text -->
  <text x="50" y="75" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="url(#faviconGradient)" text-anchor="middle">UM</text>
</svg>